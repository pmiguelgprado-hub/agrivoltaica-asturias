[theme]
# Paleta agrivoltaica profesional: verde bosque (campo) + oro solar (sol) sobre crema
# cálida. Alto contraste para accesibilidad (ancianos + jóvenes).
primaryColor = "#0f7a47"
backgroundColor = "#f7f4ec"
secondaryBackgroundColor = "#ffffff"
textColor = "#18261d"
font = "sans serif"
baseFontSize = 17
baseRadius = "0.7rem"

[client]
# Oculta el menú "Deploy" / hamburguesa: look de producto, no de demo.
toolbarMode = "minimal"

[server]
headless = true
